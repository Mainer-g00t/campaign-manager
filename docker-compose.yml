services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campaign-manager
    ports:
      - '3001:3001'
    volumes:
      - ./data:/app/data
    environment:
      PORT: 3001
      # Public URL used as CDR callback_url sent to the VoIP platform
      APP_URL: http://campaign-manager:3001
      # Connects to the shared postgres on the voiceai network
      DATABASE_URL: postgresql://voiceai:${POSTGRES_PASSWORD}@postgres:5432/campaign_manager
      # Default VoIP base URL — config-api is reachable via the shared voiceai network
      VOIP_BASE_URL: http://config-api:8080
    networks:
      - voiceai
    restart: unless-stopped

networks:
  voiceai:
    external: true
    name: voice-asterisk-agent_voiceai
